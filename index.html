<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ziggy | Sales Engineer @ Delinea</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --delinea-purple: #231556;
      --delinea-midnight: #0C102A;
      --delinea-green: #00FF59;
      --delinea-cyan: #00FFD1;
      --delinea-sky-blue: #56BAF6;
      --delinea-gray: #888B8D;
      --font: 'Arial', sans-serif;
    }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 20%, rgba(255,255,255,0.07) 0%, var(--delinea-midnight) 70%);
      background-color: var(--delinea-midnight);
      color: #ffffff;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    /* Logo */
    .logo-wrap {
      opacity: 0.9;
    }
    .logo-wrap svg {
      width: 140px;
      height: auto;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 3px;
      background: var(--delinea-green);
      border-radius: 2px;
    }

    /* Avatar / Initials */
    .avatar {
      width: 88px;
      height: 88px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--delinea-purple) 0%, #3a1f8a 100%);
      border: 3px solid var(--delinea-green);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: var(--delinea-green);
      letter-spacing: 1px;
      box-shadow: 0 0 24px rgba(0, 255, 89, 0.25);
    }

    /* Name & title */
    .identity {
      text-align: center;
    }
    .identity h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #ffffff;
      line-height: 1.1;
    }
    .identity .role {
      margin-top: 0.35rem;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--delinea-green);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    /* Tagline */
    .tagline {
      text-align: center;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      max-width: 360px;
    }

    /* Link buttons */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .link-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.9rem 1.4rem;
      border-radius: 10px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(255, 255, 255, 0.05);
      color: #ffffff;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(0, 255, 89, 0.15);
      background: rgba(255, 255, 255, 0.09);
      border-color: rgba(0, 255, 89, 0.35);
    }

    .link-btn:hover::before {
      opacity: 1;
    }

    .link-btn:active {
      transform: translateY(0);
    }

    .link-btn .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .link-btn .icon svg {
      width: 20px;
      height: 20px;
    }

    .link-btn .label {
      flex: 1;
    }

    .link-btn .arrow {
      color: rgba(255,255,255,0.3);
      font-size: 1.1rem;
      transition: color 0.15s, transform 0.15s;
    }

    .link-btn:hover .arrow {
      color: var(--delinea-green);
      transform: translateX(3px);
    }

    /* Button accent colors */
    .btn-calendar .icon {
      background: rgba(0, 255, 89, 0.15);
      color: var(--delinea-green);
    }
    .btn-linkedin .icon {
      background: rgba(86, 186, 246, 0.15);
      color: var(--delinea-sky-blue);
    }
    .btn-company .icon {
      background: rgba(0, 255, 209, 0.12);
      color: var(--delinea-cyan);
    }

    /* Footer */
    .footer {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.25);
      text-align: center;
    }
  </style>
</head>
<body>

46.7 257.5 97.2 257.5C179.9 257.5 209.4 189.7 209.4 130 209.4 70.3 179.8 2.5 97.2 2.5Z" fill="#FFFFFF"/>
      </svg>
    </div>

    <div class="divider"></div>

    <!-- Avatar -->
    <div class="avatar">Z</div>

    <!-- Name & Role -->
    <div class="identity">
      <h1>Ziggy</h1>
      <div class="role">Sales Engineer</div>
    </div>

    <!-- Tagline -->
    <p class="tagline">Bridging the gap between cybersecurity and business&nbsp;&mdash; one demo at a time.</p>

    <!-- Links -->
    <div class="links">

      <!-- Calendly -->
      <a class="link-btn btn-calendar" href="https://calendly.com" target="_blank" rel="noopener noreferrer">
        <span class="icon">

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

      <!-- LinkedIn -->
      <a class="link-btn btn-linkedin" href="https://linkedin.com" target="_blank" rel="noopener noreferrer">
        <span class="icon">
          <!-- LinkedIn icon -->

      <!-- Delinea -->
      <a class="link-btn btn-company" href="https://delinea.com" target="_blank" rel="noopener noreferrer">
        <span class="icon">
          <!-- Globe / company icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    <p class="footer">&copy; 2026 Ziggy &middot; Delinea</p>

</html>
